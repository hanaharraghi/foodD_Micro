spring.application.name=api-gateway
server.port=8082

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
eureka.instance.prefer-ip-address=true

spring.config.import=optional:configserver:http://config-server:8888

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/microservices

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**

spring.cloud.gateway.routes[1].id=menu-service
spring.cloud.gateway.routes[1].uri=lb://MENU-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/menus/**

spring.cloud.gateway.routes[2].id=feedback-service
spring.cloud.gateway.routes[2].uri=lb://FEEDBACK-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/feedbacks/**

spring.cloud.gateway.routes[3].id=delivery-service
spring.cloud.gateway.routes[3].uri=lb://DELIVERY-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/deliveries/**

spring.cloud.gateway.routes[4].id=order-service
spring.cloud.gateway.routes[4].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/orders/**

spring.cloud.gateway.routes[5].id=blog-service
spring.cloud.gateway.routes[5].uri=http://blog-service:3001
spring.cloud.gateway.routes[5].predicates[0]=Path=/blogs/**

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always